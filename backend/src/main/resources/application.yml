spring:
  application:
    name: agronorte-backend

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:agronorte}?useSSL=false&serverTimezone=America/Cuiaba&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: ${DB_USER:agronorte}
    password: ${DB_PASSWORD:agronorte_dev}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: AgroNorteHikariPool

  jpa:
    hibernate:
      ddl-auto: validate  # Flyway gerencia o schema, JPA apenas valida
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        default_batch_fetch_size: 25  # Tuning: batch fetch para evitar N+1
        jdbc:
          batch_size: 25

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: false

  jackson:
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false
    default-property-inclusion: non_null
    time-zone: America/Cuiaba

security:
  jwt:
    secret: ${JWT_SECRET:bXlhZ3Jvbm9ydGVzdXBlcnNlY3JldGtleWZvcmRldmVsb3BtZW50b25seW5vdGZvcnByb2R1Y3Rpb24xMjM0NTY3ODkw}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}  # 24h

server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,text/plain
    min-response-size: 1024

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.agronorte: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
